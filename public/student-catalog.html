<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Component Catalog — CERP</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="/student-style.css">
</head>
<body class="student-portal">

  <div class="sp-topbar">
    <button type="button" onclick="document.getElementById('sidebar').classList.toggle('is-open')">[ ≡ ]</button>
    <span>MENU</span>
  </div>

  <div class="sp-layout">
    <aside class="sp-sidebar" id="sidebar">
      <div class="sp-sidebar__head">
        <img src="/ennovate-logo.png" alt="">
        <span>CERP</span>
      </div>
      <nav class="sp-nav">
        <a href="/student-dashboard">Dashboard</a>
        <a href="/student-catalog" class="is-active">Catalog</a>
        <a href="/student-requests-page">My Requests</a>
        <a href="/student-my-profile">My Profile</a>
        <a href="#" onclick="logout(); return false;">Logout</a>
      </nav>
      <div class="sp-sidebar__foot">
        <img src="/ennovate-logo.png" alt="">
        Student Portal<br>
        Built by Jishnu Abbhay D
      </div>
    </aside>

    <main class="sp-main">
      <h1 class="sp-title">CATALOG</h1>
      <p class="sp-sub">// Browse available components & add to cart</p>

      <div class="sp-card" style="display:flex; flex-wrap:wrap; gap:12px; align-items:center; margin-bottom:0;">
        <input type="text" id="searchInput" placeholder="Search components..." oninput="filterCatalog()" style="flex:1; min-width:200px; margin:0;">
        <button type="button" id="cartToggleDesktop" class="sp-btn sp-btn--primary sp-interactive" style="display:none;" onclick="toggleCartDrawer()">[ Cart <span id="cartCountDesktop">0</span> ]</button>
      </div>

      <div class="sp-cat-grid" id="catalogGrid" style="margin-top:1px;"></div>
    </main>
  </div>

  <div id="cartOverlay" class="sp-cart-overlay" onclick="toggleCartDrawer()"></div>
  <div id="cartDrawer" class="sp-cart-drawer">
    <div style="padding:20px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center;">
      <h2 style="font-family:'Bebas Neue',sans-serif; font-size:28px; letter-spacing:3px; margin:0;">CART</h2>
      <button type="button" class="sp-btn sp-btn--secondary no-magnetic" onclick="toggleCartDrawer()">[ × ]</button>
    </div>
    <div id="cartItemsList" style="flex:1; overflow-y:auto; padding:20px;"></div>
    <div style="padding:20px; border-top:1px solid var(--border);">
      <label class="sp-label" for="cartPurposeNote">Purpose / Note (optional)</label>
      <textarea id="cartPurposeNote" rows="3" style="resize:none; width:100%; box-sizing:border-box;"></textarea>
      <button type="button" id="submitBulkRequestBtn" class="sp-btn sp-btn--primary sp-btn--block sp-interactive" style="margin-top:16px;" disabled onclick="submitCart()">[ Submit Request ]</button>
    </div>
  </div>

  <button type="button" id="cartFAB" class="sp-fab sp-interactive" onclick="toggleCartDrawer()" aria-label="Open cart">
    <span style="font-size:18px;">⬡</span>
    <span id="cartBadgeCount" class="sp-fab-badge">0</span>
  </button>

  <div id="toast" class="sp-toast" role="status"></div>

  <script src="/grain.js"></script>
  <script src="/identity-strip.js"></script>
  <script src="/student-cursor.js"></script>
  <script src="/magnetic-buttons.js"></script>
  <script src="/club-branding.js"></script>
  <script src="/dark-mode.js"></script>
  <script>
    let allComponents = [];
    let cart = [];

    function toggleCartDrawer() {
      const d = document.getElementById("cartDrawer");
      const o = document.getElementById("cartOverlay");
      const open = d.classList.toggle("is-open");
      o.classList.toggle("is-open", open);
      document.body.style.overflow = open ? "hidden" : "";
    }

    function showToast(message, success = true) {
      const t = document.getElementById("toast");
      t.textContent = message;
      t.className = "sp-toast is-visible " + (success ? "sp-toast--ok" : "sp-toast--err");
      setTimeout(() => t.classList.remove("is-visible"), 2500);
    }

    async function logout() {
      await fetch("/student-logout", { method: "POST" });
      window.location.href = "/student-login.html";
    }

    async function loadCatalog() {
      try {
        const res = await fetch("/api/student/catalog", { credentials: "same-origin" });
        if (res.status === 401) { window.location.href = "/student-login.html"; return; }
        allComponents = await res.json();
        renderCatalog(allComponents);
      } catch (e) { console.error(e); }
    }

    function filterCatalog() {
      const q = document.getElementById("searchInput").value.toLowerCase();
      renderCatalog(allComponents.filter(c => c.name.toLowerCase().includes(q)));
    }

    function availBadge(c) {
      if (c.available_quantity <= 0) return '<span class="sp-badge sp-badge--red">Out of Stock</span>';
      if (c.available_quantity < 5) return '<span class="sp-badge sp-badge--amber">Low Stock</span>';
      return '<span class="sp-badge sp-badge--green">Available</span>';
    }

    function renderCatalog(components) {
      const grid = document.getElementById("catalogGrid");
      if (components.length === 0) {
        grid.innerHTML = '<div class="sp-cat-card"><div class="sp-cat-card-inner"><p class="sp-sub">// no components found</p></div></div>';
        return;
      }
      grid.innerHTML = components.map(c => {
        const inStock = c.available_quantity > 0;
        const ci = cart.find(x => x.component_id === c.id);
        const inCart = !!ci;
        const img = c.photo1
          ? `<img class="sp-cat-img" src="${escapeAttr(c.photo1)}" alt="">`
          : `<div class="sp-cat-img-ph">// NO IMG</div>`;
        let actions = "";
        if (!inStock) {
          actions = `<button type="button" class="sp-btn sp-btn--secondary sp-btn--block" disabled style="opacity:0.5; cursor:not-allowed; margin-top:12px; border-color:rgba(255,255,255,0.05); color:var(--dim);">[ Out of Stock ]</button>`;
        } else if (!inCart) {
          actions = `<button type="button" class="sp-btn sp-btn--primary sp-btn--block sp-interactive" style="margin-top:12px;" onclick="addToCart(${c.id})">[ Add to Cart ]</button>`;
        } else {
          actions = `
            <div style="display:flex; align-items:center; gap:8px; margin-top:12px;">
              <button type="button" class="sp-btn sp-btn--secondary sp-interactive" onclick="updateCartQty(${c.id},-1)">−</button>
              <span style="font-family:'Bebas Neue',sans-serif; font-size:22px; flex:1; text-align:center;">${ci.quantity}</span>
              <button type="button" class="sp-btn sp-btn--secondary sp-interactive" onclick="updateCartQty(${c.id},1)">+</button>
            </div>
            <button type="button" class="sp-btn sp-btn--danger sp-btn--block sp-interactive" style="margin-top:8px;" onclick="removeFromCart(${c.id})">[ Remove ]</button>`;
        }
        return `
          <div class="sp-cat-card sp-card">
            ${img}
            <div class="sp-cat-card-inner">
              <div style="display:flex; justify-content:space-between; align-items:flex-start; gap:8px;">
                <span style="font-family:Barlow,sans-serif; font-weight:600; font-size:14px; color:var(--white);">${escapeHtml(c.name)}</span>
                ${availBadge(c)}
              </div>
              <p style="font-family:'JetBrains Mono',monospace; font-size:8px; color:var(--dim); margin:8px 0 0;">total: ${c.total_quantity} · available: ${c.available_quantity}</p>
              ${actions}
            </div>
          </div>`;
      }).join("");
      window.initStudentMagnetic();
    }

    function escapeHtml(t) {
      const d = document.createElement("div");
      d.textContent = t;
      return d.innerHTML;
    }
    function escapeAttr(t) {
      return String(t).replace(/&/g,"&amp;").replace(/"/g,"&quot;").replace(/</g,"&lt;");
    }

    function addToCart(component_id) {
      const c = allComponents.find(x => x.id === component_id);
      if (!c) return;
      cart.push({ component_id, component_name: c.name, quantity: 1, available_quantity: c.available_quantity });
      updateUI();
      renderCatalog(allComponents);
      const fab = document.getElementById("cartFAB");
      fab.style.transform = "scale(1.12)";
      setTimeout(() => { fab.style.transform = ""; }, 200);
    }
    function removeFromCart(component_id) {
      cart = cart.filter(i => i.component_id !== component_id);
      updateUI();
      renderCatalog(allComponents);
    }
    function updateCartQty(component_id, delta) {
      const item = cart.find(i => i.component_id === component_id);
      if (!item) return;
      const nq = item.quantity + delta;
      if (nq > item.available_quantity) { showToast("Only " + item.available_quantity + " available", false); return; }
      if (nq > 5) { showToast("Max limit is 5 per item", false); return; }
      if (nq <= 0) removeFromCart(component_id);
      else { item.quantity = nq; updateUI(); renderCatalog(allComponents); }
    }

    function updateUI() {
      const n = cart.length;
      const badge = document.getElementById("cartBadgeCount");
      const desk = document.getElementById("cartToggleDesktop");
      const deskN = document.getElementById("cartCountDesktop");
      document.getElementById("submitBulkRequestBtn").disabled = n === 0;
      if (n > 0) {
        badge.textContent = n;
        badge.style.display = "flex";
        deskN.textContent = n;
        desk.style.display = "inline-flex";
      } else {
        badge.style.display = "none";
        desk.style.display = "none";
      }
      const list = document.getElementById("cartItemsList");
      if (cart.length === 0) {
        list.innerHTML = '<p class="sp-sub" style="text-align:center; margin-top:40px;">// cart empty</p>';
        return;
      }
      list.innerHTML = cart.map(item => `
        <div class="sp-card" style="margin-bottom:12px;">
          <div style="display:flex; justify-content:space-between;">
            <div>
              <div style="font-family:Barlow,sans-serif; font-weight:600; font-size:13px;">${escapeHtml(item.component_name)}</div>
              <div style="font-family:'JetBrains Mono',monospace; font-size:8px; color:var(--dim);">// stock: ${item.available_quantity}</div>
            </div>
            <button type="button" class="sp-btn sp-btn--secondary sp-btn--sm no-magnetic" onclick="removeFromCart(${item.component_id})">×</button>
          </div>
          <div style="display:flex; align-items:center; gap:12px; margin-top:12px;">
            <button type="button" class="sp-btn sp-btn--secondary sp-interactive" onclick="updateCartQty(${item.component_id},-1)">−</button>
            <span style="font-family:'Bebas Neue',sans-serif; font-size:22px;">${item.quantity}</span>
            <button type="button" class="sp-btn sp-btn--secondary sp-interactive" onclick="updateCartQty(${item.component_id},1)">+</button>
          </div>
        </div>`).join("");
      window.initStudentMagnetic();
    }

    async function submitCart() {
      if (cart.length === 0) return;
      const purpose_note = document.getElementById("cartPurposeNote").value.trim();
      const items = cart.map(i => ({ component_id: i.component_id, quantity: i.quantity }));
      const btn = document.getElementById("submitBulkRequestBtn");
      btn.disabled = true;
      btn.innerHTML = "[ Processing… ]";
      try {
        const res = await fetch("/api/student/request-bulk", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          credentials: "same-origin",
          body: JSON.stringify({ items, purpose_note })
        });
        const data = await res.json();
        if (data.success) {
          showToast(data.message || "Submitted");
          cart = [];
          document.getElementById("cartPurposeNote").value = "";
          updateUI();
          renderCatalog(allComponents);
          toggleCartDrawer();
        } else showToast(data.message || "Error", false);
      } catch (e) {
        showToast("Error submitting request", false);
      }
      btn.innerHTML = "[ Submit Request ]";
      btn.disabled = cart.length === 0;
    }

    window.onload = loadCatalog;
  </script>
</body>
</html>
