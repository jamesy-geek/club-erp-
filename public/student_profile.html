<!DOCTYPE html>
<html>

<head>
  <title>Student Profile — CERP</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="/style.css">
  <script>if (localStorage.getItem("darkMode") == "true") document.documentElement.className = "dark"</script>
  <script src="/club-branding.js"></script>
  <script src="/admin-sidebar.js"></script>
</head>

<body>

  <div class="menu-toggle" onclick="toggleMenu()">
    ☰ Menu
  </div>

  <div class="layout">

    <div id="admin-sidebar-placeholder"></div>

    <div class="content">
      <h1>Student Profile</h1>
      <p style="color:#64748b; margin-top:-16px; margin-bottom:20px; font-size:15px;">View detailed transaction history for a student</p>

      <div class="card" style="margin-bottom:20px; display:flex; gap:10px; align-items:center;">
        <input type="text" id="searchUSN" placeholder="Enter USN (e.g. 4NN22CS001)" style="flex:1; margin-bottom:0;">
        <button onclick="loadProfile()" style="width:auto;">🔍 Search Profile</button>
      </div>

      <div id="studentDetailCard" class="card" style="display:none; border-left: 4px solid #1e293b; margin-bottom:24px;">
        <h3 id="displayName" style="margin-top:0; color:#1e293b;"></h3>
        <div style="display:grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap:15px; font-size:14px; color:#475569;">
          <div><strong style="color: #64748b; font-size:12px; text-transform:uppercase;">USN</strong><br><span id="displayUSN" style="font-weight:600; font-size:16px; color:#1e293b;"></span></div>
          <div><strong style="color: #64748b; font-size:12px; text-transform:uppercase;">Email</strong><br><span id="displayEmail"></span></div>
          <div><strong style="color: #64748b; font-size:12px; text-transform:uppercase;">Phone</strong><br><span id="displayPhone"></span></div>
          <div><strong style="color: #64748b; font-size:12px; text-transform:uppercase;">Semester</strong><br><span id="displaySem"></span></div>
          <div><strong style="color: #64748b; font-size:12px; text-transform:uppercase;">Department</strong><br><span id="displayDept"></span></div>
        </div>

      </div>

      <div class="card">
        <h3>Transaction History</h3>
        <div style="overflow-x:auto;">
          <table width="100%">
            <thead>
              <tr>
                <th>Component</th>
                <th>Issued</th>
                <th>Returned</th>
                <th>Balance</th>
                <th>Return Date</th>
              </tr>
            </thead>
            <tbody id="profileTable">
              <tr>
                <td colspan="5" style="text-align:center; padding:40px; color:#94a3b8;">Enter a student USN to view history</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>

      <div id="summaryCard" class="card" style="display:none; background:#f8fafc; border:1px solid #e2e8f0;">
        <div style="display:flex; justify-content:space-around; text-align:center;">
          <div><div style="font-size:12px; color:#64748b; text-transform:uppercase;">Total Issued</div><div id="totalIssued" style="font-size:20px; font-weight:700; color:#1e293b;">0</div></div>
          <div><div style="font-size:12px; color:#64748b; text-transform:uppercase;">Total Returned</div><div id="totalReturned" style="font-size:20px; font-weight:700; color:#1e293b;">0</div></div>
          <div><div style="font-size:12px; color:#64748b; text-transform:uppercase;">Active Holding</div><div id="totalHolding" style="font-size:20px; font-weight:700; color:#2563eb;">0</div></div>
        </div>
      </div>
    </div>
  </div>

  <div id="toast"></div>

  <script>

    function showToast(message, success = true) {
      const toast = document.getElementById("toast");
      toast.className = "toast show";
      toast.style.background = success ? "#16a34a" : "#dc2626";
      toast.innerText = message;
      setTimeout(() => toast.className = "toast", 2500);
    }

    async function loadProfile() {
      const usn = document.getElementById("searchUSN").value.trim();
      if (!usn) return;

      try {
        const res = await fetch("/student/" + usn, { credentials: "same-origin" });
        const data = await res.json();
        
        const table = document.getElementById("profileTable");
        const detailCard = document.getElementById("studentDetailCard");
        const summaryCard = document.getElementById("summaryCard");

        if (!data || data.length === 0) {
          table.innerHTML = `<tr><td colspan="5" style="text-align:center; padding:40px; color:#dc2626;">No data found for USN: ${usn}</td></tr>`;
          detailCard.style.display = "none";
          summaryCard.style.display = "none";
          return;
        }

        // Show info from the first record
        detailCard.style.display = "block";
        summaryCard.style.display = "block";
        document.getElementById("displayName").textContent = data[0].student_name;
        document.getElementById("displayUSN").textContent = (data[0].usn || '').toUpperCase();
        document.getElementById("displayEmail").textContent = data[0].email || 'N/A';
        document.getElementById("displayPhone").textContent = data[0].phone || 'N/A';
        document.getElementById("displaySem").textContent = data[0].semester || 'N/A';
        document.getElementById("displayDept").textContent = data[0].department || 'N/A';

        if (data[0].is_empty) {
          table.innerHTML = `<tr><td colspan="5" style="text-align:center; padding:40px; color:#64748b;">No transaction history found for this student.</td></tr>`;
          document.getElementById("totalIssued").textContent = "0";
          document.getElementById("totalReturned").textContent = "0";
          document.getElementById("totalHolding").textContent = "0";
          return;
        }

        table.innerHTML = "";
        let totalI = 0, totalR = 0;
        
        // Group by issue_id
        const grouped = {};
        data.forEach(row => {
          if (!row.issue_timestamp) return;
          if (!grouped[row.issue_id]) grouped[row.issue_id] = [];
          grouped[row.issue_id].push(row);
        });

        Object.keys(grouped).forEach(issue_id => {
          const items = grouped[issue_id];
          const firstItem = items[0];
          const localTime = new Date(firstItem.issue_timestamp).toLocaleString();
          
          table.innerHTML += `
            <tr style="background:#f1f5f9; border-top:2px solid #cbd5e1;">
              <td colspan="5" style="padding:10px; font-weight:bold; color:#334155;">
                Cart Ref: #${issue_id} &nbsp;|&nbsp; Checked out: ${localTime}
              </td>
            </tr>
          `;
          
          items.forEach(row => {
            totalI += row.quantity;
            totalR += row.returned_quantity;
            const remaining = row.quantity - row.returned_quantity;
            const retDate = row.return_timestamp && row.returned_quantity > 0 ? new Date(row.return_timestamp).toLocaleDateString() : '-';

            table.innerHTML += `
              <tr>
                <td style="padding-left:20px; font-weight:600; color:#1e293b;">${row.component_name}</td>
                <td>${row.quantity}</td>
                <td>${row.returned_quantity}</td>
                <td style="font-weight:700; color:${remaining > 0 ? '#2563eb' : '#64748b'}">${remaining}</td>
                <td style="color:#64748b; font-size:12px;">${retDate}</td>
              </tr>
            `;
          });
        });

        document.getElementById("totalIssued").textContent = totalI;
        document.getElementById("totalReturned").textContent = totalR;
        document.getElementById("totalHolding").textContent = totalI - totalR;

      } catch (err) {
        showToast("Error loading profile data", false);
      }
    }


    // Auto-load if USN in URL
    window.onload = () => {
      const params = new URLSearchParams(window.location.search);
      const usn = params.get("usn");
      if (usn) {
        document.getElementById("searchUSN").value = usn;
        loadProfile();
      }
    };
  </script>
  <script src="/dark-mode.js"></script>
</body>
</html>
