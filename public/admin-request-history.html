<!DOCTYPE html>
<html>
<head>
  <title>Request Logs — CERP</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="/style.css">
  <script>if (localStorage.getItem("darkMode") == "true") document.documentElement.className = "dark"</script>
  <script src="/club-branding.js"></script>
</head>
<body>
  <div class="menu-toggle" onclick="toggleMenu()">☰ Menu</div>
  <div class="layout">
    <div class="sidebar" id="sidebar">
      <h2><img src="/ennovate-logo.png" alt=""> CERP</h2>
      <a href="/" id="nav-dashboard">Dashboard</a>
      <a href="/components-page" id="nav-components">Components</a>
      <a href="/transactions-page" id="nav-transactions">Transactions</a>
      <a href="/reports-page" id="nav-reports">Reports</a>
      <a href="/students-page" id="nav-students">Students</a>
      <a href="/student_profile.html" id="nav-profile">Student Profile</a>
      <a href="/admin-requests-page" id="nav-requests">Request Queue</a>
      <a href="/admin-request-history.html" class="active" id="nav-logs">Request Logs</a>
      <a href="/admin-damage-log.html" id="nav-damage">Damage Log</a>
      <!-- Links injected by club-branding.js -->
      <hr>
      <a href="/admin-settings.html" id="nav-settings">Admin Settings</a>
      <a href="#" onclick="logout()">Logout</a>
    </div>

    <div class="content">
      <h1>Request Logs</h1>
      <p style="color:#64748b; margin-top:-16px; margin-bottom:20px; font-size:14px;">View historical request data and audit trails</p>

      <div class="card">
        <div style="overflow-x:auto;">
          <table width="100%">
            <thead>
              <tr>
                <th>Student</th>
                <th>Component</th>
                <th>Qty</th>
                <th>Status</th>
                <th>Processed By</th>
                <th>Date</th>
                <th>Log</th>
              </tr>
            </thead>
            <tbody id="historyTable">
              <tr><td colspan="7" style="text-align:center; padding:40px; color:#94a3b8;">Loading history...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <!-- Log Modal -->
  <div id="logModal" class="modal-overlay">
    <div class="modal-box" style="max-width: 600px;">
      <h2>Audit Log</h2>
      <div id="logContent" style="background:#f8fafc; padding:15px; border-radius:8px; font-family:'JetBrains Mono', monospace; font-size:12px; max-height: 400px; overflow-y: auto; white-space: pre-wrap;"></div>
      <div class="modal-actions">
        <button onclick="closeLogModal()">Close</button>
      </div>
    </div>
  </div>

  <div id="toast"></div>

  <script>
    async function loadHistory() {
      try {
        const res = await fetch("/api/admin/request-history");
        if (res.status === 401) { window.location.href = "/login.html"; return; }
        const data = await res.json();
        renderTable(data);
      } catch (e) { showToast("Error loading logs", false); }
    }

    function renderTable(rows) {
      const tbody = document.getElementById("historyTable");
      if (rows.length === 0) {
        tbody.innerHTML = '<tr><td colspan="7" style="text-align:center; padding:40px;">No historical requests found.</td></tr>';
        return;
      }

      tbody.innerHTML = rows.map(r => `
        <tr>
          <td>
            <strong>${r.student_name}</strong><br>
            <span style="font-size:11px; color:#64748b;">${r.usn}</span>
          </td>
          <td>${r.component_name}</td>
          <td>${r.quantity}</td>
          <td><span class="badge ${getBadgeClass(r.status)}">${r.status}</span></td>
          <td>${r.admin_name || 'System'}</td>
          <td style="font-size:11px; color:#64748b;">${new Date(r.updated_at).toLocaleString()}</td>
          <td>
            <button class="btn-sm" style="background:#334155;" onclick='showLog(${JSON.stringify(r.edit_log)})'>View</button>
          </td>
        </tr>
      `).join('');
    }

    function getBadgeClass(s) {
      if (s === 'APPROVED') return 'badge-green';
      if (s === 'REJECTED') return 'badge-red';
      return '';
    }

    function showLog(logStr) {
      let log = [];
      try { log = JSON.parse(logStr || '[]'); } catch(e) {}
      
      const content = document.getElementById("logContent");
      if (log.length === 0) {
        content.textContent = "No edit history available for this request.";
      } else {
        content.innerHTML = log.map(entry => `
          <div style="margin-bottom:10px; border-bottom:1px solid #e2e8f0; padding-bottom:8px;">
            <div style="color:#2563eb; font-weight:bold;">${entry.date} - ${entry.admin}</div>
            <div style="color:#64748b; margin-top:4px;">${entry.action}: ${entry.details}</div>
          </div>
        `).join('');
      }
      document.getElementById("logModal").classList.add("active");
    }

    function closeLogModal() { document.getElementById("logModal").classList.remove("active"); }

    function showToast(message, success = true) {
      const toast = document.getElementById("toast");
      toast.style.background = success ? "#16a34a" : "#dc2626";
      toast.innerText = message;
      toast.style.display = "block";
      setTimeout(() => toast.style.display = "none", 2500);
    }

    function toggleMenu() { document.getElementById("sidebar").classList.toggle("active"); }
    async function logout() { await fetch("/logout", { method: "POST" }); window.location.href = "/login.html"; }

    window.onload = loadHistory;
  </script>
</body>
</html>
