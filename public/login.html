<!DOCTYPE html>
<html>

<head>
  <title>Admin Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="/style.css">
</head>

<body>

  <div class="layout" style="justify-content:center;align-items:center;">

    <div style="text-align: center;">
      <img src="/ennovate-logo.png" alt=".ennovate" style="width: 140px; margin-bottom: 8px; opacity: 0.85;">
      <p style="color: #64748b; font-size: 12px; margin-bottom: 24px; letter-spacing: 0.5px;">Club ERP Management System
      </p>

      <div class="card" style="width:320px; text-align: left;">
        <h2 style="text-align: center; margin-bottom: 16px;">Admin Login</h2>

        <input id="username" placeholder="Username">
        
        <div class="password-wrapper" style="position: relative;">
          <input id="password" type="password" placeholder="Password" style="padding-right: 40px;">
          <span id="togglePassword" onclick="togglePasswordVisibility()" style="position: absolute; right: 12px; top: 50%; transform: translateY(-50%); cursor: pointer; opacity: 0.5; font-size: 18px; user-select: none;">👁️</span>
        </div>

        <button onclick="login()" style="width: 100%; justify-content: center; margin-top: 8px;">Login</button>
      </div>


      <p style="margin-top: 16px;">
        <a href="/student-login.html" style="color: #4f46e5; font-size: 13px; text-decoration: none; font-weight: 500;">Student Login →</a>
      </p>

      <p style="color: #94a3b8; font-size: 10px; margin-top: 8px;">Built by Jishnu Abbhay D</p>
    </div>

  </div>

  <script>

    function togglePasswordVisibility() {
      const passwordInput = document.getElementById("password");
      const toggleIcon = document.getElementById("togglePassword");
      if (passwordInput.type === "password") {
        passwordInput.type = "text";
        toggleIcon.textContent = "🙈";
      } else {
        passwordInput.type = "password";
        toggleIcon.textContent = "👁️";
      }
    }

    async function login() {


      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value.trim();


      const res = await fetch("/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        credentials: "same-origin",
        body: JSON.stringify({ username, password })
      });

      const data = await res.json();

      if (data.success) {
        window.location.href = "/dashboard.html";
      } else {
        alert(data.message || "Invalid credentials");
      }
    }

  </script>

  <script>
    async function logout() {
      await fetch("/logout", {
        method: "POST"
      });
      window.location.href = "/login.html";
    }
  </script>

</body>

</html>
