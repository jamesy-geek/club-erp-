<!DOCTYPE html>
<html>

<head>
  <title>Admin Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="/style.css">
</head>

<body>

  <div class="layout" style="justify-content:center;align-items:center;">

    <div style="text-align: center;">
      <img src="/ennovate-logo.png" alt=".ennovate" style="width: 140px; margin-bottom: 8px; opacity: 0.85;">
      <p style="color: #64748b; font-size: 12px; margin-bottom: 24px; letter-spacing: 0.5px;">Club ERP Management System
      </p>

      <div class="card" style="width:320px; text-align: left;">
        <h2 style="text-align: center; margin-bottom: 16px;">Admin Login</h2>

        <input id="username" placeholder="Username">
        <input id="password" type="password" placeholder="Password">

        <button onclick="login()" style="width: 100%; justify-content: center; margin-top: 8px;">Login</button>
      </div>

      <p style="color: #94a3b8; font-size: 10px; margin-top: 16px;">Built by Jishnu Abbhay D</p>
    </div>

  </div>

  <script>

    async function login() {

      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value.trim();


      const res = await fetch("/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        credentials: "same-origin",
        body: JSON.stringify({ username, password })
      });

      const data = await res.json();

      if (data.success) {
        window.location.href = "/dashboard.html";
      } else {
        alert(data.message || "Invalid credentials");
      }
    }

  </script>

  <script>
    async function logout() {
      await fetch("/logout", {
        method: "POST"
      });
      window.location.href = "/login.html";
    }
  </script>

</body>

</html>
