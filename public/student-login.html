<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Student Login — CERP</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="/student-style.css">
</head>
<body class="student-portal sp-login-body">

  <div class="sp-login-page">
    <div style="text-align:center; margin-bottom:24px;">
      <img src="/ennovate-logo.png" alt="Ennovate" width="52" height="52" style="filter:invert(1); width:52px; height:auto;">
      <p class="sp-sub" style="margin-top:16px;">// Student Portal · CERP</p>
    </div>

    <div class="sp-login-card">
      <h1>LOGIN</h1>
      <p class="sp-login-sub">Sign in with your student account</p>

      <label class="sp-label" for="email">Email</label>
      <input id="email" type="email" autocomplete="username" placeholder="your.email@example.com">

      <label class="sp-label" for="password" style="margin-top:14px;">Password</label>
      <div class="password-wrap" style="position:relative;">
        <input id="password" type="password" autocomplete="current-password" placeholder="Password" style="padding-right:40px;">
        <button type="button" class="no-magnetic" onclick="togglePw()" style="position:absolute; right:8px; top:50%; transform:translateY(-50%); background:transparent; border:none; color:var(--dim); cursor:pointer; font-size:14px;" aria-label="Toggle password">👁</button>
      </div>

      <div id="errorMsg" class="sp-login-error"></div>

      <button type="button" class="sp-btn sp-btn--primary sp-btn--block" style="margin-top:20px;" onclick="studentLogin()">[ Sign In ]</button>
    </div>

    <div class="sp-login-links">
      <a href="/login.html">Admin Login →</a>
      <p class="sp-login-built">// Built by Jishnu Abbhay D</p>
    </div>
  </div>

  <div id="toast" class="sp-toast" role="status"></div>

  <script src="/grain.js"></script>
  <script src="/identity-strip.js"></script>
  <script src="/student-cursor.js"></script>
  <script src="/magnetic-buttons.js"></script>
  <script src="/student-effects.js"></script>
  <script src="/club-branding.js"></script>
  <script src="/dark-mode.js"></script>
  <script>
    function togglePw() {
      const p = document.getElementById("password");
      p.type = p.type === "password" ? "text" : "password";
    }
    document.getElementById("password").addEventListener("keydown", e => { if (e.key === "Enter") studentLogin(); });
    document.getElementById("email").addEventListener("keydown", e => { if (e.key === "Enter") document.getElementById("password").focus(); });

    function showToast(message, success = true) {
      const t = document.getElementById("toast");
      t.textContent = message;
      t.className = "sp-toast is-visible " + (success ? "sp-toast--ok" : "sp-toast--err");
      setTimeout(() => t.classList.remove("is-visible"), 2500);
    }

    async function studentLogin() {
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value.trim();
      const err = document.getElementById("errorMsg");
      err.style.display = "none";
      if (!email || !password) {
        err.textContent = " Please enter email and password";
        err.style.display = "block";
        return;
      }
      try {
        const res = await fetch("/student-login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          credentials: "same-origin",
          body: JSON.stringify({ email, password })
        });
        const data = await res.json();
        if (data.success) window.location.href = "/student-dashboard";
        else {
          err.textContent = " " + (data.message || "Invalid credentials");
          err.style.display = "block";
        }
      } catch (e) {
        err.textContent = " Connection error. Please try again.";
        err.style.display = "block";
      }
    }
  </script>
</body>
</html>
