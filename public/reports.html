<!DOCTYPE html>
<html>

<head>
  <title>Reports - Club ERP</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="/style.css">
</head>

<body>

  <div class="menu-toggle" onclick="toggleMenu()">☰ Menu</div>

  <div class="layout">

    <div class="sidebar" id="sidebar">
      <h2>Club ERP</h2>

      <a href="/">Dashboard</a>
      <a href="/components-page">Components</a>
      <a href="/issue-page">Issue</a>
      <a href="/transactions-page">Transactions</a>
      <a href="/reports-page">Reports</a>
      <a href="/student.html">Student Profile</a>

      <hr>

      <a href="/admin-settings.html">Admin Settings</a>
      <a href="#" onclick="logout()">Logout</a>
    </div>

    <div class="content">
      <h1>Download Reports</h1>

      <div class="card">
        <label>USN (comma separated for multiple)</label>
        <input type="text" id="usnInput" placeholder="4NN22CS001,4NN22CS002">

        <label>Start Date</label>
        <input type="date" id="startDate">

        <label>End Date</label>
        <input type="date" id="endDate">

        <div style="margin-top: 16px; display: flex; gap: 12px; flex-wrap: wrap;">
          <button onclick="downloadExcel()">Download Excel</button>
          <button onclick="downloadPDF()">Download PDF</button>
        </div>
      </div>
    </div>

  </div>

  <script>

    function toggleMenu() {
      document.getElementById("sidebar").classList.toggle("active");
    }

    function buildQuery() {
      const usn = document.getElementById("usnInput").value.trim();
      const startDate = document.getElementById("startDate").value;
      const endDate = document.getElementById("endDate").value;

      let params = new URLSearchParams();

      if (usn) params.append("usn", usn);
      if (startDate) params.append("startDate", startDate);
      if (endDate) params.append("endDate", endDate);

      return "?" + params.toString();
    }

    function downloadExcel() {
      window.open("/download-report-excel" + buildQuery(), "_blank");
    }

    function downloadPDF() {
      window.open("/download-report-pdf" + buildQuery(), "_blank");
    }

    async function logout() {
      await fetch("/logout", { method: "POST", credentials: "same-origin" });
      window.location.href = "/login.html";
    }

  </script>

</body>

</html>
