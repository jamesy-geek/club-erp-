<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Student Dashboard — CERP</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="/student-style.css">
</head>
<body class="student-portal">

  <div class="sp-topbar">
    <button type="button" onclick="document.getElementById('sidebar').classList.toggle('is-open')">[ ≡ ]</button>
    <span>MENU</span>
  </div>

  <div class="sp-layout">
    <aside class="sp-sidebar" id="sidebar">
      <div class="sp-sidebar__head">
        <img src="/ennovate-logo.png" alt="">
        <span>CERP</span>
      </div>
      <nav class="sp-nav">
        <a href="/student-dashboard" class="is-active">Dashboard</a>
        <a href="/student-catalog">Catalog</a>
        <a href="/student-requests-page">My Requests</a>
        <a href="/student-my-profile">My Profile</a>
        <a href="#" onclick="logout(); return false;">Logout</a>
      </nav>
      <div class="sp-sidebar__foot">
        <img src="/ennovate-logo.png" alt="">
        Student Portal<br>
        Built by Jishnu Abbhay D
      </div>
    </aside>

    <main class="sp-main">
      <h1 class="sp-title">DASHBOARD</h1>
      <p class="sp-sub" id="welcomeSub">// Welcome, <span id="studentName">—</span> · <span id="studentUSN">—</span></p>

      <div style="margin-bottom:28px;">
        <a href="/student-catalog" class="sp-btn sp-btn--primary sp-interactive">[ Browse & Request Components ]</a>
      </div>

      <div class="sp-card" style="border-left:2px solid rgba(74,222,128,0.38);">
        <h2 style="font-family:'Bebas Neue',sans-serif; font-size:20px; letter-spacing:2px; margin:0 0 16px;">Active Borrows</h2>
        <div id="borrowsList"><p class="sp-sub" style="margin:0;">// loading</p></div>
      </div>

      <div class="sp-card" style="border-left:2px solid rgba(245,158,11,0.38); margin-top:16px;">
        <h2 style="font-family:'Bebas Neue',sans-serif; font-size:20px; letter-spacing:2px; margin:0 0 16px;">Pending Requests</h2>
        <div id="pendingList"><p class="sp-sub" style="margin:0;">// loading</p></div>
      </div>

      <div class="sp-card" style="margin-top:16px;">
        <h2 style="font-family:'Bebas Neue',sans-serif; font-size:20px; letter-spacing:2px; margin:0 0 16px;">Request History</h2>
        <div id="historyList"><p class="sp-sub" style="margin:0;">// loading</p></div>
      </div>
    </main>
  </div>

  <div id="toast" class="sp-toast" role="status"></div>

  <script src="/grain.js"></script>
  <script src="/identity-strip.js"></script>
  <script src="/student-cursor.js"></script>
  <script src="/magnetic-buttons.js"></script>
  <script src="/club-branding.js"></script>
  <script src="/dark-mode.js"></script>
  <script>
    function showToast(message, success = true) {
      const t = document.getElementById("toast");
      t.textContent = message;
      t.className = "sp-toast is-visible " + (success ? "sp-toast--ok" : "sp-toast--err");
      setTimeout(() => t.classList.remove("is-visible"), 2500);
    }
    async function logout() {
      await fetch("/student-logout", { method: "POST" });
      window.location.href = "/student-login.html";
    }
    function badgeClass(st) {
      const g = ["APPROVED", "CONFIRMED", "COMPLETED"];
      const a = ["PENDING", "DRAFT"];
      const r = ["REJECTED", "WITHDRAWN", "EXPIRED"];
      if (g.includes(st)) return "sp-badge sp-badge--green";
      if (a.includes(st)) return "sp-badge sp-badge--amber";
      if (r.includes(st)) return st === "WITHDRAWN" ? "sp-badge sp-badge--neutral" : "sp-badge sp-badge--red";
      return "sp-badge sp-badge--neutral";
    }
    function badgeHtml(st) {
      return `<span class="${badgeClass(st)}">${st}</span>`;
    }
    async function loadDashboard() {
      try {
        const sRes = await fetch("/student-session", { credentials: "same-origin" });
        if (sRes.status === 401) { window.location.href = "/student-login.html"; return; }
        const student = await sRes.json();
        document.getElementById("studentName").textContent = student.student_name;
        document.getElementById("studentUSN").textContent = (student.usn || "").toUpperCase();
      } catch (e) { window.location.href = "/student-login.html"; return; }

      try {
        const res = await fetch("/api/student/dashboard", { credentials: "same-origin" });
        if (res.status === 401) { window.location.href = "/student-login.html"; return; }
        const data = await res.json();

        const bEl = document.getElementById("borrowsList");
        if (data.borrows.length === 0) {
          bEl.innerHTML = '<p class="sp-sub" style="margin:0;">// no active borrows</p>';
        } else {
          bEl.innerHTML = data.borrows.map(b => `
            <div style="display:flex; justify-content:space-between; align-items:flex-start; gap:12px; padding:12px 0; border-bottom:1px solid var(--border);">
              <div>
                <span style="font-family:Barlow,sans-serif; font-weight:600; font-size:13px;">${b.component_name}</span>
                <span class="sp-badge sp-badge--green">IN USE</span>
                <div style="font-family:'JetBrains Mono',monospace; font-size:8px; color:var(--dim); margin-top:6px;">// issued: ${b.quantity} · returned: ${b.returned_quantity}</div>
              </div>
              <span style="font-family:'Bebas Neue',sans-serif; font-size:34px; color:var(--white); line-height:1;">${b.remaining}</span>
            </div>`).join("");
        }

        const pEl = document.getElementById("pendingList");
        if (data.pending.length === 0) {
          pEl.innerHTML = '<p class="sp-sub" style="margin:0;">// no pending requests</p>';
        } else {
          pEl.innerHTML = data.pending.map(p => `
            <div style="padding:12px 0; border-bottom:1px solid var(--border);">
              <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:8px;">
                <span style="font-family:Barlow,sans-serif; font-weight:600; font-size:13px;">${p.component_name} × ${p.quantity}</span>
                ${badgeHtml(p.status)}
                <span style="font-family:'JetBrains Mono',monospace; font-size:8px; color:var(--dim); margin-left:auto;">${new Date(p.created_at).toLocaleString()}</span>
              </div>
              ${p.purpose_note ? `<div style="font-family:'JetBrains Mono',monospace; font-size:8px; color:var(--dim); margin-top:6px;">// ${escapeHtml(p.purpose_note)}</div>` : ""}
            </div>`).join("");
        }

        const hEl = document.getElementById("historyList");
        if (data.history.length === 0) {
          hEl.innerHTML = '<p class="sp-sub" style="margin:0;">// no request history yet</p>';
        } else {
          hEl.innerHTML = data.history.map(h => `
            <div style="padding:12px 0; border-bottom:1px solid var(--border);">
              <span style="font-family:Barlow,sans-serif; font-weight:600; font-size:13px;">${h.component_name} × ${h.quantity}</span>
              ${badgeHtml(h.status)}
              ${h.rejection_reason ? `<div style="font-family:'JetBrains Mono',monospace; font-size:8px; color:rgba(248,113,113,0.6); margin-top:6px;">reason: ${escapeHtml(h.rejection_reason)}</div>` : ""}
              <div style="font-family:'JetBrains Mono',monospace; font-size:8px; color:var(--dim); margin-top:6px;">${new Date(h.created_at).toLocaleString()}</div>
            </div>`).join("");
        }
        window.initStudentMagnetic();
      } catch (err) {
        console.error(err);
      }
    }
    function escapeHtml(s) {
      const d = document.createElement("div");
      d.textContent = s;
      return d.innerHTML;
    }
    window.onload = loadDashboard;
  </script>
</body>
</html>
