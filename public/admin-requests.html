<!DOCTYPE html>
<html>
<head>
  <title>Request Queue — CERP</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="/style.css">
</head>
<body>

  <div class="menu-toggle" onclick="toggleMenu()">☰ Menu</div>

  <div class="layout">

    <div class="sidebar" id="sidebar">
      <h2><img src="/ennovate-logo.png" alt=""> CERP</h2>
      <a href="/" id="nav-dashboard">Dashboard</a>
      <a href="/components-page">Components</a>
      <a href="/issue-page">Issue</a>
      <a href="/transactions-page">Transactions</a>
      <a href="/reports-page">Reports</a>
      <a href="/students-page">Students</a>
      <a href="/student.html">Student Profile</a>
      <a href="/admin-requests-page" class="active">Request Queue</a>
      <hr>
      <a href="/admin-settings.html">Admin Settings</a>
      <a href="#" onclick="logout()">Logout</a>
      <div class="sidebar-footer">
        <img src="/ennovate-logo.png" alt="">
        <span>Built by Jishnu Abbhay D</span>
      </div>
    </div>

    <div class="content">
      <h1>Request Queue</h1>
      <p style="color:#64748b; margin-top:-16px; margin-bottom:20px; font-size:14px;">Review and manage student component requests</p>

      <!-- Filter tabs -->
      <div style="display:flex; gap:8px; margin-bottom:20px; flex-wrap:wrap;">
        <button onclick="loadRequests('ALL')" class="btn-sm" style="background:#0f172a;" id="fAll">All</button>
        <button onclick="loadRequests('PENDING')" class="btn-sm" style="background:#f59e0b;" id="fPending">Pending</button>
        <button onclick="loadRequests('APPROVED')" class="btn-sm" style="background:#16a34a;" id="fApproved">Approved</button>
        <button onclick="loadRequests('REJECTED')" class="btn-sm" style="background:#dc2626;" id="fRejected">Rejected</button>
        <button onclick="loadRequests('CONFIRMED')" class="btn-sm" style="background:#0891b2;" id="fConfirmed">Confirmed</button>
      </div>

      <div id="requestsList"></div>
    </div>
  </div>

  <!-- Reject Modal -->
  <div class="modal-overlay" id="rejectModal">
    <div class="modal-box">
      <h2>Reject Request</h2>
      <input type="hidden" id="rejectReqId">
      <label>Reason (optional)</label>
      <textarea id="rejectReason" rows="3" placeholder="Reason for rejection..." style="resize:vertical;"></textarea>
      <div class="modal-actions">
        <button class="btn-cancel" onclick="closeRejectModal()">Cancel</button>
        <button onclick="confirmReject()" style="background:#dc2626;">Reject Request</button>
      </div>
    </div>
  </div>

  <!-- Edit Modal -->
  <div class="modal-overlay" id="adminEditModal">
    <div class="modal-box">
      <h2>Edit Request</h2>
      <input type="hidden" id="adminEditId">

      <label>Component</label>
      <input id="adminEditComponent" readonly style="background:#f1f5f9; font-weight:600;">

      <label>Quantity</label>
      <input id="adminEditQuantity" type="number" min="1">

      <label>Purpose / Note</label>
      <textarea id="adminEditNote" rows="3" style="resize:vertical;"></textarea>

      <label>Status Override</label>
      <select id="adminEditStatus">
        <option value="">— Keep current —</option>
        <option value="PENDING">PENDING</option>
        <option value="APPROVED">APPROVED</option>
        <option value="REJECTED">REJECTED</option>
        <option value="WITHDRAWN">WITHDRAWN</option>
        <option value="CONFIRMED">CONFIRMED</option>
        <option value="COMPLETED">COMPLETED</option>
      </select>

      <div class="modal-actions">
        <button class="btn-cancel" onclick="closeAdminEditModal()">Cancel</button>
        <button onclick="saveAdminEdit()">Save Changes</button>
      </div>
    </div>
  </div>

  <div id="toast"></div>

  <script>
    let currentFilter = 'ALL';

    function toggleMenu() {
      document.getElementById("sidebar").classList.toggle("active");
    }

    function showToast(message, success = true) {
      const toast = document.getElementById("toast");
      toast.style.background = success ? "#16a34a" : "#dc2626";
      toast.innerText = message;
      toast.style.display = "block";
      setTimeout(() => toast.style.display = "none", 2500);
    }

    async function logout() {
      await fetch("/logout", { method: "POST" });
      window.location.href = "/login.html";
    }

    function statusBadge(status) {
      const colors = {
        PENDING: 'background:#f59e0b;color:#fff',
        APPROVED: 'background:#16a34a;color:#fff',
        REJECTED: 'background:#dc2626;color:#fff',
        WITHDRAWN: 'background:#64748b;color:#fff',
        CONFIRMED: 'background:#0891b2;color:#fff',
        COMPLETED: 'background:#334155;color:#fff',
        EXPIRED: 'background:#94a3b8;color:#fff'
      };
      return `<span class="badge" style="${colors[status] || 'background:#e2e8f0;color:#334155'}">${status}</span>`;
    }

    async function loadRequests(filter) {
      if (filter) currentFilter = filter;
      try {
        const res = await fetch(`/api/admin/requests?status=${currentFilter}`, { credentials: "same-origin" });
        if (res.status === 401) { window.location.href = "/login.html"; return; }
        const requests = await res.json();
        renderRequests(requests);
      } catch (err) {
        console.error("Load requests error:", err);
      }
    }

    function renderRequests(requests) {
      const container = document.getElementById("requestsList");

      if (requests.length === 0) {
        container.innerHTML = '<div class="card"><p style="color:#94a3b8;">No requests found</p></div>';
        return;
      }

      container.innerHTML = requests.map(r => {
        const borderColor = { PENDING: '#f59e0b', APPROVED: '#16a34a', REJECTED: '#dc2626', WITHDRAWN: '#64748b', CONFIRMED: '#0891b2' }[r.status] || '#e2e8f0';
        const isPending = r.status === 'PENDING';

        return `
          <div class="card" style="border-left: 4px solid ${borderColor};">
            <div style="display:flex; justify-content:space-between; align-items:flex-start; flex-wrap:wrap; gap:8px;">
              <div>
                <strong style="font-size:15px;">${r.component_name}</strong> × ${r.quantity}
                ${statusBadge(r.status)}
                <br>
                <span style="font-size:13px; color:#334155;">👤 ${r.student_name}</span>
                <code style="background:#f1f5f9; padding:2px 6px; border-radius:4px; font-size:12px; margin-left:6px;">${r.usn}</code>
                ${r.email ? `<span style="font-size:12px; color:#64748b; margin-left:8px;">📧 ${r.email}</span>` : ''}
              </div>
              <span style="font-size:12px; color:#94a3b8;">${new Date(r.created_at).toLocaleString()}</span>
            </div>
            ${r.purpose_note ? `<p style="color:#64748b; font-size:13px; margin:8px 0 0;">📝 ${r.purpose_note}</p>` : ''}
            ${r.rejection_reason ? `<p style="color:#dc2626; font-size:13px; margin:8px 0 0;">❌ ${r.rejection_reason}</p>` : ''}
            ${r.confirmed_at ? `<p style="color:#0891b2; font-size:12px; margin:8px 0 0;">✅ Student confirmed: ${new Date(r.confirmed_at).toLocaleString()}</p>` : ''}

            <div style="margin-top:12px; display:flex; gap:8px; flex-wrap:wrap;">
              ${isPending ? `
                <button class="btn-sm" style="background:#16a34a;" onclick="approveRequest(${r.id})">✅ Approve</button>
                <button class="btn-sm" style="background:#dc2626;" onclick="openRejectModal(${r.id})">❌ Reject</button>
              ` : ''}
              <button class="btn-sm btn-edit" onclick="openAdminEditModal(${r.id}, '${r.component_name.replace(/'/g, "\\'")}', ${r.quantity}, '${(r.purpose_note || '').replace(/'/g, "\\'")}', '${r.status}')">✏️ Edit</button>
            </div>
          </div>
        `;
      }).join('');
    }

    // Approve
    async function approveRequest(id) {
      if (!confirm("Approve this request? This will create an issue record and decrement stock.")) return;
      try {
        const res = await fetch(`/api/admin/requests/${id}/approve`, {
          method: "POST",
          headers: { "Content-Type": "application/json" }
        });
        const data = await res.json();
        showToast(data.message, data.success);
        loadRequests();
      } catch (err) {
        showToast("Error approving request", false);
      }
    }

    // Reject
    function openRejectModal(id) {
      document.getElementById("rejectReqId").value = id;
      document.getElementById("rejectReason").value = "";
      document.getElementById("rejectModal").classList.add("active");
    }

    function closeRejectModal() {
      document.getElementById("rejectModal").classList.remove("active");
    }

    document.getElementById("rejectModal").addEventListener("click", function(e) {
      if (e.target === this) closeRejectModal();
    });

    async function confirmReject() {
      const id = document.getElementById("rejectReqId").value;
      const reason = document.getElementById("rejectReason").value.trim();

      try {
        const res = await fetch(`/api/admin/requests/${id}/reject`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ reason })
        });
        const data = await res.json();
        showToast(data.message, data.success);
        closeRejectModal();
        loadRequests();
      } catch (err) {
        showToast("Error rejecting request", false);
      }
    }

    // Admin Edit
    function openAdminEditModal(id, componentName, quantity, note, status) {
      document.getElementById("adminEditId").value = id;
      document.getElementById("adminEditComponent").value = componentName;
      document.getElementById("adminEditQuantity").value = quantity;
      document.getElementById("adminEditNote").value = note;
      document.getElementById("adminEditStatus").value = "";
      document.getElementById("adminEditModal").classList.add("active");
    }

    function closeAdminEditModal() {
      document.getElementById("adminEditModal").classList.remove("active");
    }

    document.getElementById("adminEditModal").addEventListener("click", function(e) {
      if (e.target === this) closeAdminEditModal();
    });

    async function saveAdminEdit() {
      const id = document.getElementById("adminEditId").value;
      const quantity = parseInt(document.getElementById("adminEditQuantity").value);
      const purpose_note = document.getElementById("adminEditNote").value.trim();
      const status = document.getElementById("adminEditStatus").value || undefined;

      try {
        const res = await fetch(`/api/admin/requests/${id}`, {
          method: "PUT",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ quantity, purpose_note, status })
        });
        const data = await res.json();
        showToast(data.message, data.success);
        closeAdminEditModal();
        loadRequests();
      } catch (err) {
        showToast("Error updating request", false);
      }
    }

    window.onload = () => loadRequests('PENDING');
  </script>

</body>
</html>
